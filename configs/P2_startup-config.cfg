!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname P2
!
boot-start-marker
boot-end-marker
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
!
multilink bundle-name authenticated
!
ip tcp synwait-time 5
!
interface Loopback0
 ip address 1.1.1.3 255.255.255.255
 no shutdown
!
interface f0/0
 ip address 10.0.0.6 255.255.255.252
 no shutdown
!
interface g1/0
 ip address 10.0.0.9 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 1.1.1.3
 network 1.1.1.3 0.0.0.0 area 0
 network 10.0.0.4 0.0.0.3 area 0
 network 10.0.0.8 0.0.0.3 area 0
!
control-plane
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end