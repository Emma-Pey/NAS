!

!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname CE3
!
boot-start-marker
boot-end-marker
!
!
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
!
!
!
!
!
no ip domain lookup
no ipv6 cef
!
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
ip tcp synwait-time 5
! 
!
!
!
!
!
!
!
!
!
!
!
interface Loopback0
 ip address 192.168.21.1 255.255.255.128
!
interface Loopback1
 ip address 172.16.21.1 255.255.255.0
!
interface FastEthernet0/0
 ip address 10.0.3.1 255.255.255.252
 duplex full
!
interface GigabitEthernet1/0
 ip address 10.0.3.5 255.255.255.252
 negotiation auto
!
interface GigabitEthernet2/0
 no ip address
 shutdown
 negotiation auto
!
router bgp 4
 bgp log-neighbor-changes
 neighbor 10.0.3.2 remote-as 1
 neighbor 10.0.3.6 remote-as 1
 !
 address-family ipv4
  network 172.16.21.0 mask 255.255.255.0
  network 192.168.21.0 mask 255.255.255.128
  neighbor 10.0.3.2 activate
  neighbor 10.0.3.2 send-community
  neighbor 10.0.3.2 allowas-in
  neighbor 10.0.3.2 route-map TO_PE1A out
  neighbor 10.0.3.6 activate
  neighbor 10.0.3.6 send-community
  neighbor 10.0.3.6 allowas-in
  neighbor 10.0.3.6 route-map TO_PE1B out
 exit-address-family
!
ip forward-protocol nd
!
!
no ip http server
no ip http secure-server
!
!
ip prefix-list PL_L0 seq 5 permit 192.168.21.0/25
!
ip prefix-list PL_L1 seq 5 permit 172.16.21.0/24
!
route-map TO_PE1A permit 10
 match ip address prefix-list PL_L0
 set community 65636
!
route-map TO_PE1B permit 10
 match ip address prefix-list PL_L1
 set community 65636
!
!
!
control-plane
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
!
end
