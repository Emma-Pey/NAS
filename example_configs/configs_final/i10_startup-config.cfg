!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname PE1B
!
boot-start-marker
boot-end-marker
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
!
multilink bundle-name authenticated
!
ip tcp synwait-time 5
!
mpls traffic-eng tunnels
!
ip vrf BLUE
 rd 1:202
 route-target export 1:20
 route-target import 1:20
 route-target import 1:30
 route-target import 1:40
!
interface Loopback0
 ip address 1.1.1.2 255.255.255.255
 ip ospf 1 area 0
 no shutdown
!
interface GigabitEthernet1/0
 ip address 10.0.0.5 255.255.255.252
 ip ospf 1 area 0
 mpls ip
 mpls traffic-eng tunnels
 ip rsvp bandwidth 1000000
 no shutdown
!
interface FastEthernet0/0
 ip vrf forwarding BLUE
 ip address 10.0.3.6 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 1.1.1.2
 mpls traffic-eng router-id Loopback0
 mpls traffic-eng area 0
!
router bgp 1
 bgp log-neighbor-changes
 neighbor 1.1.1.4 remote-as 1
 neighbor 1.1.1.4 update-source Loopback0
 !
 address-family ipv4
  neighbor 1.1.1.4 activate
  neighbor 1.1.1.4 next-hop-self
 exit-address-family
 !
 address-family vpnv4
  neighbor 1.1.1.4 activate
  neighbor 1.1.1.4 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf BLUE
  neighbor 10.0.3.5 remote-as 4
  neighbor 10.0.3.5 activate
  neighbor 10.0.3.5 route-map CLIENT_IN in
 exit-address-family
!
ip community-list standard CL_PRIMARY permit 65636
!
route-map CLIENT_IN permit 10
 match community CL_PRIMARY
 set local-preference 200
!
route-map CLIENT_IN permit 20
 set local-preference 100
!
control-plane
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end