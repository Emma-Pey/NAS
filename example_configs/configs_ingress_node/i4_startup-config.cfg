!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname PE2
!
boot-start-marker
boot-end-marker
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
!
multilink bundle-name authenticated
!
ip tcp synwait-time 5
!
ip vrf BLACK
 rd 1:105
 route-target export 1:10
 route-target import 1:10
 route-target import 1:30
!
ip vrf BLUE
 rd 1:205
 route-target export 1:20
 route-target import 1:20
 route-target import 1:30
!
interface Loopback0
 ip address 1.1.1.5 255.255.255.255
 ip ospf 1 area 0
 no shutdown
!
interface FastEthernet0/0
 ip address 10.0.0.14 255.255.255.252
 ip ospf 1 area 0
 mpls ip
 no shutdown
!
interface GigabitEthernet1/0
 ip vrf forwarding BLACK
 ip address 10.0.2.2 255.255.255.252
 no shutdown
!
interface GigabitEthernet2/0
 ip vrf forwarding BLUE
 ip address 10.0.3.10 255.255.255.252
 no shutdown
!
router ospf 1
 router-id 1.1.1.5
!
router bgp 1
 bgp log-neighbor-changes
 neighbor 1.1.1.4 remote-as 1
 neighbor 1.1.1.4 update-source Loopback0
 !
 address-family ipv4
  neighbor 1.1.1.4 activate
  neighbor 1.1.1.4 next-hop-self
 exit-address-family
 !
 address-family vpnv4
  neighbor 1.1.1.4 activate
  neighbor 1.1.1.4 send-community extended
 exit-address-family
 !
 address-family ipv4 vrf BLACK
  neighbor 10.0.2.1 remote-as 3
  neighbor 10.0.2.1 activate
  neighbor 10.0.2.1 route-map CLIENT_IN in
 exit-address-family
 !
 address-family ipv4 vrf BLUE
  neighbor 10.0.3.9 remote-as 4
  neighbor 10.0.3.9 activate
  neighbor 10.0.3.9 route-map CLIENT_IN in
 exit-address-family
!
ip community-list standard CL_PRIMARY permit 65636
!
route-map CLIENT_IN permit 10
 match community CL_PRIMARY
 set local-preference 200
!
route-map CLIENT_IN permit 20
 set local-preference 100
!
control-plane
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end