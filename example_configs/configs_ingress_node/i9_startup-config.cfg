!
version 15.2
service timestamps debug datetime msec
service timestamps log datetime msec
!
hostname CE5
!
boot-start-marker
boot-end-marker
!
no aaa new-model
no ip icmp rate-limit unreachable
ip cef
!
no ip domain lookup
!
multilink bundle-name authenticated
!
ip tcp synwait-time 5
!
interface Loopback0
 ip address 192.168.31.1 255.255.255.0
 no shutdown
!
interface FastEthernet0/0
 ip address 10.0.4.1 255.255.255.252
 no shutdown
!
router bgp 5
 bgp log-neighbor-changes
 neighbor 10.0.4.2 remote-as 1
 !
 address-family ipv4
  network 192.168.31.0 mask 255.255.255.0
  neighbor 10.0.4.2 activate
 exit-address-family
!
control-plane
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
!
end